name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install Astro dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Install ranker dependencies
        run: npm ci
        working-directory: terminal-desires-ranker

      - name: Build ranker
        run: npm run build
        working-directory: terminal-desires-ranker

      - name: Install coffee-rush dependencies
        run: npm ci
        working-directory: coffee-rush

      - name: Build coffee-rush
        run: npm run build
        working-directory: coffee-rush
        env:
          VITE_COFFEE_RUSH_RELAY_URL: ${{ vars.COFFEE_RUSH_RELAY_URL }}

      - name: Assemble site artifact
        run: |
          rm -rf site
          mkdir -p site
          cp -a dist/. site/
          mkdir -p site/terminal-desires-ranker
          cp -a terminal-desires-ranker/dist/. site/terminal-desires-ranker/
          mkdir -p site/coffee-rush
          cp -a coffee-rush/dist/. site/coffee-rush/
          touch site/.nojekyll
          if [ -f CNAME ]; then cp CNAME site/CNAME; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
