name: Tennis Prize Money Data Refresh

on:
  workflow_dispatch:
    inputs:
      refresh_reason:
        description: Optional note for the refresh run
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: tennis-prize-money-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tennis-prize-money/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: tennis-prize-money

      - name: Run app tests
        run: npm run test
        working-directory: tennis-prize-money

      - name: Refresh static data
        run: npm run refresh:data
        working-directory: tennis-prize-money
        env:
          REFRESH_SOURCE_MANIFEST_URL: ${{ secrets.TENNIS_PRIZE_MONEY_REFRESH_SOURCE_MANIFEST_URL }}
          REFRESH_UPDATE_TIMESTAMP: "true"

      - name: Commit refreshed static JSON
        run: |
          set -euo pipefail
          DATA_PATHS=(
            "tennis-prize-money/src/data/static/seedDatasetMetadata.json"
            "tennis-prize-money/src/data/raw/source-metadata/grandSlam2025Sources.json"
            "tennis-prize-money/src/data/normalized/grandSlam2025MensSingles.json"
          )

          if git diff --quiet -- "${DATA_PATHS[@]}"; then
            echo "No static JSON changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${DATA_PATHS[@]}"
          git commit -m "chore: refresh tennis prize money data"
          git push origin "HEAD:${GITHUB_REF_NAME}"
